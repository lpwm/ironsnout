<html lang="en"><head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta http-equiv="pragma" content="no-cache">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta charset="utf-8">

        <!-- Set the title bar of the page -->
        <title>Iron Snout</title>
		<meta name="description" content="Iron Snout is a online fighting game created by SnoutUp where you play as a pig, and have to fight the wolves.">
		<meta name="robots" content="noindex,nofollow" />
	<script type="text/javascript" src="poki-sdk.js"></script>
        <style>
            body {
              background: #ffffff;
              color:#cccccc;
              margin: 0px;
              padding: 0px;
              border: 0px;
			  overflow:hidden;
            }
			
            canvas {
                      image-rendering: optimizeSpeed;
                      -webkit-interpolation-mode: nearest-neighbor;
                      -ms-touch-action: none;
                      touch-action: none;
                      margin: 0px;
                      padding: 0px;
                      border: 0px;
            }
            :-webkit-full-screen #canvas {
                 width: 100%;
                 height: 100%;
            }
			
            div.gm4html5_div_class
            {
              margin: 0px;
              padding: 0px;
              border: 0px;
            }

            /* Infinite Health Toggle */
            #cheat-toggle {
              position: fixed;
              top: 10px;
              right: 10px;
              z-index: 9999;
              display: flex;
              align-items: center;
              gap: 8px;
              background: rgba(0, 0, 0, 0.7);
              padding: 8px 12px;
              border-radius: 20px;
              cursor: pointer;
              user-select: none;
              font-family: Arial, sans-serif;
              font-size: 13px;
              color: #fff;
              transition: background 0.2s;
            }
            #cheat-toggle:hover {
              background: rgba(0, 0, 0, 0.85);
            }
            #cheat-toggle .toggle-switch {
              position: relative;
              width: 36px;
              height: 20px;
              background: #555;
              border-radius: 10px;
              transition: background 0.2s;
            }
            #cheat-toggle .toggle-switch::after {
              content: '';
              position: absolute;
              top: 2px;
              left: 2px;
              width: 16px;
              height: 16px;
              background: #fff;
              border-radius: 50%;
              transition: transform 0.2s;
            }
            #cheat-toggle.active .toggle-switch {
              background: #4caf50;
            }
            #cheat-toggle.active .toggle-switch::after {
              transform: translateX(16px);
            }
        </style>
</head>

    <body>
        <!-- Infinite Health Toggle Button -->
        <div id="cheat-toggle" onclick="toggleInfiniteHealth()">
            <span>&#x2764; Infinite HP</span>
            <div class="toggle-switch"></div>
        </div>

        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <!-- Create the canvas element the game draws to -->
            <canvas id="canvas" width="640" height="360" style="touch-action: none; cursor: none;">
               <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
			
			<script type="text/javascript" src="html5game/IronSnout.js?YJKZB=528561031"></script>
        </div>
		<script>
		var sdk 		= PokiSDK;
		var pokiDebug 	= false;
        var canvas      = document.getElementById("canvas");

        // Infinite Health Mode
        window.infiniteHealth = false;

        function toggleInfiniteHealth() {
            window.infiniteHealth = !window.infiniteHealth;
            var btn = document.getElementById('cheat-toggle');
            if (window.infiniteHealth) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }
		
		function poki_log(t) {
			if (pokiDebug) console.log(t);
		}
		
		function poki_loading(percents) {
			// no-op: Poki SDK removed
		}

		
		window.onload = function() {
            // Monkey-patch health functions for infinite health mode

            // Patch _0H: PlayerHealthChange(player, change)
            // This is called when the player takes damage (change < 0)
            if (typeof _0H === 'function') {
                var _originalHealthChange = _0H;
                var _patchedHealthChange = function(_li, _mi, _Ki, _Li) {
                    if (window.infiniteHealth) {
                        var change = _Li;
                        if (typeof change === 'number' && change < 0) {
                            return 1;
                        }
                        if (typeof change === 'object' && change.valueOf && change.valueOf() < 0) {
                            return 1;
                        }
                    }
                    return _originalHealthChange(_li, _mi, _Ki, _Li);
                };
                _patchedHealthChange._qS4 = _patchedHealthChange;
                _0H = _patchedHealthChange;
            }

            // Patch _1I: SetHealth(entity, hp) - prevents health from being set to 0 or below
            if (typeof _1I === 'function') {
                var _originalSetHealth = _1I;
                _1I = function(_li, _mi, _Ki, _Li) {
                    if (window.infiniteHealth) {
                        var hp = _Li;
                        if (typeof hp === 'number' && hp <= 0) {
                            _Li = 1;
                        } else if (typeof hp === 'object' && hp.valueOf && hp.valueOf() <= 0) {
                            _Li = 1;
                        }
                    }
                    return _originalSetHealth(_li, _mi, _Ki, _Li);
                };
                _1I._qS4 = _1I;
            }

			// Start the game directly without Poki SDK
			GameMaker_Init();
            
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.addEventListener('click', function(){
                window.focus();
            });               
		}
		</script>
    </body></html>
